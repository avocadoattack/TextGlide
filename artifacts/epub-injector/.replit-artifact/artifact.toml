kind = "web"
previewPath = "/"
title = "Phrase-Spacing EPUB Injector"
version = "1.0.0"
id = "artifacts/epub-injector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22108

[services.development]
run = "pnpm --filter @workspace/epub-injector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/epub-injector", "run", "build" ]
publicDir = "artifacts/epub-injector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22108"
BASE_PATH = "/"
